<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>ConsoleMud - Definitions Editor</title>
<style>
  :root {
    --bg: #0f1117;
    --panel: #171a23;
    --panel-2: #1f2430;
    --border: #2a3140;
    --text: #e6e9ef;
    --muted: #9aa3b2;
    --accent: #4f9cff;
    --accent-2: #3a7bd5;
    --danger: #ff5d5d;
    --ok: #4fd18b;
    --warn: #ffcc66;
    --shadow: rgba(0, 0, 0, 0.4);
  }
  * { box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    margin: 0;
    background: var(--bg);
    color: var(--text);
    font: 14px/1.5 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    display: flex;
    flex-direction: column;
    height: 100vh;
  }
  header {
    background: var(--panel);
    border-bottom: 1px solid var(--border);
    padding: 10px 16px;
    display: flex;
    align-items: center;
    gap: 16px;
    flex-wrap: wrap;
  }
  header h1 {
    font-size: 16px;
    margin: 0;
    font-weight: 600;
    white-space: nowrap;
  }
  header h1 .sub { color: var(--muted); font-weight: 400; font-size: 12px; margin-left: 6px; }
  .tabs { display: flex; gap: 4px; flex: 1; flex-wrap: wrap; }
  .tab {
    background: transparent;
    border: 1px solid transparent;
    color: var(--muted);
    padding: 6px 14px;
    border-radius: 8px;
    cursor: pointer;
    font-size: 13px;
    font-weight: 500;
  }
  .tab:hover { color: var(--text); background: var(--panel-2); }
  .tab.active { color: #fff; background: var(--accent-2); border-color: var(--accent); }
  .header-actions { display: flex; gap: 8px; }
  button.btn {
    background: var(--panel-2);
    color: var(--text);
    border: 1px solid var(--border);
    padding: 6px 12px;
    border-radius: 8px;
    cursor: pointer;
    font-size: 13px;
  }
  button.btn:hover { border-color: var(--accent); }
  button.btn.primary { background: var(--accent-2); border-color: var(--accent); color: #fff; }
  button.btn.danger { color: var(--danger); }
  button.btn.danger:hover { border-color: var(--danger); }
  button.btn.small { padding: 3px 8px; font-size: 12px; }

  #warnings {
    background: #2a2410;
    border-bottom: 1px solid #4a3f18;
    color: var(--warn);
    padding: 8px 16px;
    font-size: 12.5px;
    display: none;
  }
  #warnings.show { display: block; }
  #warnings ul { margin: 6px 0 0; padding-left: 20px; }
  #warnings .ok { color: var(--ok); }

  main { flex: 1; overflow: hidden; display: flex; }
  .layout { display: flex; width: 100%; height: 100%; }

  .list-panel {
    width: 280px;
    min-width: 220px;
    border-right: 1px solid var(--border);
    background: var(--panel);
    display: flex;
    flex-direction: column;
  }
  .list-panel .list-head {
    padding: 10px 12px;
    border-bottom: 1px solid var(--border);
    display: flex;
    gap: 8px;
    align-items: center;
    justify-content: space-between;
  }
  .list-panel .list-head .count { color: var(--muted); font-size: 12px; }
  .entry-list { overflow-y: auto; flex: 1; padding: 6px; }
  .entry {
    padding: 8px 10px;
    border-radius: 8px;
    cursor: pointer;
    display: flex;
    flex-direction: column;
    gap: 2px;
    border: 1px solid transparent;
  }
  .entry:hover { background: var(--panel-2); }
  .entry.active { background: var(--panel-2); border-color: var(--accent); }
  .entry .e-name { font-weight: 600; }
  .entry .e-id { color: var(--muted); font-size: 12px; font-family: ui-monospace, SFMono-Regular, Menlo, monospace; }

  .form-panel { flex: 1; overflow-y: auto; padding: 18px 22px; }
  .form-panel .form-actions { display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; }
  .empty-hint { color: var(--muted); padding: 40px; text-align: center; }

  .field { margin-bottom: 14px; max-width: 720px; }
  .field > label { display: block; font-size: 12px; color: var(--muted); margin-bottom: 4px; font-weight: 500; }
  .field input[type="text"],
  .field input[type="number"],
  .field textarea,
  .field select {
    width: 100%;
    background: var(--panel-2);
    border: 1px solid var(--border);
    color: var(--text);
    border-radius: 8px;
    padding: 8px 10px;
    font: inherit;
  }
  .field textarea { min-height: 64px; resize: vertical; }
  .field input:focus, .field textarea:focus, .field select:focus { outline: none; border-color: var(--accent); }
  .field.inline { display: flex; align-items: center; gap: 10px; }
  .field.inline > label { margin: 0; }
  .field.checkbox { display: flex; align-items: center; gap: 8px; }
  .field.checkbox input { width: 16px; height: 16px; }
  .grid { display: grid; grid-template-columns: repeat(3, minmax(0,1fr)); gap: 12px; max-width: 720px; }
  fieldset {
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px;
    margin: 0 0 16px;
    max-width: 720px;
  }
  fieldset legend { padding: 0 6px; color: var(--accent); font-size: 12px; font-weight: 600; }

  .row-list { display: flex; flex-direction: column; gap: 8px; }
  .kv-row, .obj-row, .tag-row {
    display: flex;
    gap: 8px;
    align-items: center;
  }
  .kv-row input, .kv-row select, .obj-row input, .obj-row select { flex: 1; }
  .kv-row .v, .obj-row .lvl { max-width: 130px; }
  .tag-row input { flex: 1; }
  .add-row { margin-top: 8px; }
  .ref-bad { border-color: var(--danger) !important; }
  .section-title { font-size: 12px; color: var(--muted); margin: 0 0 6px; }

  /* Tuning view */
  .tuning-wrap { padding: 16px 22px; overflow-y: auto; width: 100%; }
  table.tuning { width: 100%; border-collapse: collapse; max-width: 1100px; }
  table.tuning th, table.tuning td { text-align: left; padding: 6px 8px; border-bottom: 1px solid var(--border); vertical-align: top; }
  table.tuning th { color: var(--muted); font-size: 12px; font-weight: 600; }
  table.tuning input[type="text"], table.tuning input[type="number"] {
    width: 100%;
    background: var(--panel-2);
    border: 1px solid var(--border);
    color: var(--text);
    border-radius: 6px;
    padding: 6px 8px;
    font: inherit;
  }
  table.tuning .k { width: 280px; font-family: ui-monospace, SFMono-Regular, Menlo, monospace; }
  table.tuning .v { width: 110px; }
  .toast {
    position: fixed;
    bottom: 18px;
    left: 50%;
    transform: translateX(-50%);
    background: var(--panel-2);
    border: 1px solid var(--accent);
    color: var(--text);
    padding: 10px 18px;
    border-radius: 10px;
    box-shadow: 0 6px 24px var(--shadow);
    opacity: 0;
    transition: opacity .2s;
    pointer-events: none;
  }
  .toast.show { opacity: 1; }
  input[type="file"] { display: none; }
</style>
</head>

/* Record which top-level keys an entry had when loaded, so serialization can
   reproduce the source's (inconsistent) field presence -- e.g. some skills keep
   "ManaCost": 0 or an empty "Parameters": {} while others omit them entirely.
   Stored non-enumerable so it never leaks into JSON or key iteration. */
function stampOrig(entry, keys) {
  Object.defineProperty(entry, "__orig", { value: new Set(keys), enumerable: false, writable: true, configurable: true });
}
function ingestArray(arr) {
  (arr || []).forEach(e => { if (e && typeof e === "object") stampOrig(e, Object.keys(e)); });
  return arr || [];
}

function init() {
  state.files.classes = ingestArray(parseSeed("seed-classes") || []);
  state.files.skills  = ingestArray(parseSeed("seed-skills")  || []);
  state.files.species = ingestArray(parseSeed("seed-species") || []);
  state.files.forms   = ingestArray(parseSeed("seed-forms")   || []);
  state.files.tuning  = parseSeed("seed-tuning")  || {};

  for (const key of TAB_ORDER) {
    if (key !== "tuning") state.selected[key] = state.files[key].length ? 0 : -1;
  }

  document.getElementById("btn-download-all").onclick = downloadAll;
  document.getElementById("btn-revalidate").onclick = () => { runValidation(); renderWarnings(); toast("Validation complete"); };

  renderTabs();
  renderActiveTab();
  runValidation();
  renderWarnings();
}

/* ---------- DOM helpers ---------- */
function el(tag, props, children) {
  const node = document.createElement(tag);
  if (props) {
    for (const k in props) {
      if (k === "class") node.className = props[k];
      else if (k === "text") node.textContent = props[k];
      else if (k === "html") node.innerHTML = props[k];
      else if (k.startsWith("on") && typeof props[k] === "function") node.addEventListener(k.slice(2), props[k]);
      else if (props[k] !== null && props[k] !== undefined && props[k] !== false) node.setAttribute(k, props[k]);
    }
  }
  if (children) (Array.isArray(children) ? children : [children]).forEach(c => {
    if (c == null) return;
    node.appendChild(typeof c === "string" ? document.createTextNode(c) : c);
  });
  return node;
}
function clear(node) { while (node.firstChild) node.removeChild(node.firstChild); }

/* ---------- Tabs ---------- */
function renderTabs() {
  const nav = document.getElementById("tabs");
  clear(nav);
  for (const key of TAB_ORDER) {
    const label = key === "tuning" ? "Tuning" : SCHEMAS[key].label;
    nav.appendChild(el("button", {
      class: "tab" + (state.activeTab === key ? " active" : ""),
      onclick: () => { state.activeTab = key; renderTabs(); renderActiveTab(); }
    }, label));
  }
}

function renderActiveTab() {
  const main = document.getElementById("main");
  clear(main);
  if (state.activeTab === "tuning") main.appendChild(renderTuning());
  else main.appendChild(renderArrayTab(state.activeTab));
}

/* ---------- Array tab (list + form) ---------- */
function renderArrayTab(key) {
  const schema = SCHEMAS[key];
  const layout = el("div", { class: "layout" });

  // Left list panel
  const listPanel = el("div", { class: "list-panel" });
  const head = el("div", { class: "list-head" }, [
    el("span", { class: "count" }, state.files[key].length + " entries"),
    el("div", {}, [
      el("button", { class: "btn small", onclick: () => triggerUpload(key) }, "Upload"),
      el("button", { class: "btn small primary", onclick: () => addEntry(key) }, "+ Add")
    ])
  ]);
  listPanel.appendChild(head);

  const list = el("div", { class: "entry-list" });
  state.files[key].forEach((entry, i) => {
    const name = entry[schema.labelField] || "(unnamed)";
    const id = entry[schema.idField] || "";
    list.appendChild(el("div", {
      class: "entry" + (state.selected[key] === i ? " active" : ""),
      onclick: () => { state.selected[key] = i; renderActiveTab(); }
    }, [
      el("span", { class: "e-name" }, stripMarkup(String(name))),
      el("span", { class: "e-id" }, id)
    ]));
  });
  listPanel.appendChild(list);

  // Right form panel
  const formPanel = el("div", { class: "form-panel" });
  const idx = state.selected[key];
  if (idx == null || idx < 0 || idx >= state.files[key].length) {
    formPanel.appendChild(el("div", { class: "empty-hint" }, "Select an entry on the left, or click + Add to create one."));
  } else {
    formPanel.appendChild(renderForm(key, idx));
  }

  layout.appendChild(listPanel);
  layout.appendChild(formPanel);
  return layout;
}

function renderForm(key, idx) {
  const schema = SCHEMAS[key];
  const entry = state.files[key][idx];
  const wrap = el("div", {});

  wrap.appendChild(el("div", { class: "form-actions" }, [
    el("button", { class: "btn small", onclick: () => duplicateEntry(key, idx) }, "Duplicate"),
    el("button", { class: "btn small", onclick: () => downloadFile(key) }, "Download " + schema.file),
    el("button", { class: "btn small danger", onclick: () => deleteEntry(key, idx) }, "Delete")
  ]));

  for (const field of schema.fields) {
    wrap.appendChild(renderField(key, entry, field));
  }
  return wrap;
}

/* ---------- Field renderer ---------- */
function renderField(key, entry, field) {
  const t = field.type;
  if (t === "text" || t === "textarea") return textField(entry, field);
  if (t === "int" || t === "number") return numberField(entry, field);
  if (t === "bool") return boolField(entry, field);
  if (t === "enum") return enumField(entry, field);
  if (t === "stringList") return stringListField(key, entry, field);
  if (t === "numberMap") return numberMapField(key, entry, field);
  if (t === "object") return objectField(entry, field);
  if (t === "objectList") return objectListField(key, entry, field);
  return el("div", {});
}

function textField(entry, field) {
  const input = el(field.type === "textarea" ? "textarea" : "input", {
    type: "text",
    value: entry[field.name] != null ? entry[field.name] : "",
    placeholder: field.placeholder || "",
    oninput: e => { entry[field.name] = e.target.value; afterEdit(false); }
  });
  if (field.type === "textarea") input.value = entry[field.name] != null ? entry[field.name] : "";
  return el("div", { class: "field" }, [ el("label", {}, field.label), input ]);
}

function numberField(entry, field) {
  const isInt = field.type === "int";
  const cur = entry[field.name];
  const input = el("input", {
    type: "number",
    step: isInt ? "1" : "any",
    value: cur != null && cur !== "" ? cur : "",
    oninput: e => {
      const v = e.target.value;
      if (v === "") { entry[field.name] = field.default != null ? field.default : 0; }
      else { const n = isInt ? parseInt(v, 10) : parseFloat(v); entry[field.name] = isNaN(n) ? (field.default || 0) : n; }
      afterEdit(false);
    }
  });
  return el("div", { class: "field" }, [ el("label", {}, field.label), input ]);
}

function boolField(entry, field) {
  const input = el("input", {
    type: "checkbox",
    onchange: e => { entry[field.name] = e.target.checked; afterEdit(false); }
  });
  if (entry[field.name]) input.checked = true;
  return el("div", { class: "field checkbox" }, [ input, el("label", {}, field.label) ]);
}

function enumField(entry, field) {
  const values = ENUMS[field.enum] || [];
  const cur = entry[field.name] != null ? entry[field.name] : "";
  const opts = [];
  if (field.optional || cur === "") opts.push(el("option", { value: "" }, "(none)"));
  values.forEach(v => opts.push(el("option", { value: v }, v)));
  if (cur && !values.includes(cur)) opts.push(el("option", { value: cur }, cur + " (custom)"));
  const sel = el("select", {
    onchange: e => { entry[field.name] = e.target.value; afterEdit(false); }
  }, opts);
  sel.value = cur;
  return el("div", { class: "field" }, [ el("label", {}, field.label), sel ]);
}

function stringListField(key, entry, field) {
  if (!Array.isArray(entry[field.name])) entry[field.name] = [];
  const arr = entry[field.name];
  const rows = el("div", { class: "row-list" });
  arr.forEach((val, i) => {
    rows.appendChild(el("div", { class: "tag-row" }, [
      el("input", { type: "text", value: val, oninput: e => { arr[i] = e.target.value; afterEdit(false); } }),
      el("button", { class: "btn small danger", onclick: () => { arr.splice(i, 1); afterEdit(true); } }, "x")
    ]));
  });
  const add = el("button", { class: "btn small add-row", onclick: () => { arr.push(""); afterEdit(true); } }, "+ Add tag");
  return el("fieldset", {}, [ el("legend", {}, field.label), rows, add ]);
}

function numberMapField(key, entry, field) {
  if (typeof entry[field.name] !== "object" || entry[field.name] == null || Array.isArray(entry[field.name])) entry[field.name] = {};
  const map = entry[field.name];
  const keys = Object.keys(map);
  const rows = el("div", { class: "row-list" });

  keys.forEach((k) => {
    let keyInput;
    if (field.keyType === "enum") {
      const values = ENUMS[field.keyEnum] || [];
      const opts = values.map(v => el("option", { value: v }, v));
      if (k && !values.includes(k)) opts.push(el("option", { value: k }, k + " (custom)"));
      keyInput = el("select", {
        onchange: e => { renameKey(map, k, e.target.value); afterEdit(true); }
      }, opts);
      keyInput.value = k;
    } else {
      keyInput = el("input", { type: "text", value: k, onchange: e => { renameKey(map, k, e.target.value); afterEdit(true); } });
    }
    const valInput = el("input", {
      class: "v", type: "number", step: "any", value: map[k],
      oninput: e => { const n = parseFloat(e.target.value); map[k] = isNaN(n) ? 0 : n; afterEdit(false); }
    });
    rows.appendChild(el("div", { class: "kv-row" }, [
      keyInput, valInput,
      el("button", { class: "btn small danger", onclick: () => { delete map[k]; afterEdit(true); } }, "x")
    ]));
  });

  const add = el("button", { class: "btn small add-row", onclick: () => {
    let newKey = field.keyType === "enum" ? firstUnusedEnum(field.keyEnum, map) : uniqueKey(map, "key");
    if (newKey == null) { toast("All values already added"); return; }
    map[newKey] = field.keyType === "enum" ? 1.0 : 0;
    afterEdit(true);
  } }, "+ Add entry");

  return el("fieldset", {}, [ el("legend", {}, field.label), rows, add ]);
}

function objectField(entry, field) {
  if (typeof entry[field.name] !== "object" || entry[field.name] == null) entry[field.name] = {};
  const obj = entry[field.name];
  const grid = el("div", { class: "grid" });
  field.sub.forEach(sf => {
    if (obj[sf.name] == null) obj[sf.name] = sf.default != null ? sf.default : 0;
    const input = el("input", {
      type: "number", step: "1", value: obj[sf.name],
      oninput: e => { const n = parseInt(e.target.value, 10); obj[sf.name] = isNaN(n) ? 0 : n; afterEdit(false); }
    });
    grid.appendChild(el("div", { class: "field" }, [ el("label", {}, sf.label), input ]));
  });
  return el("fieldset", {}, [ el("legend", {}, field.label), grid ]);
}

function objectListField(key, entry, field) {
  if (!Array.isArray(entry[field.name])) entry[field.name] = [];
  const arr = entry[field.name];
  const rows = el("div", { class: "row-list" });

  arr.forEach((row, i) => {
    const cells = [];
    field.sub.forEach(sf => {
      if (sf.type === "skillRef") {
        cells.push(skillRefControl(row, sf, i));
      } else if (sf.type === "int") {
        const input = el("input", {
          class: "lvl", type: "number", step: "1", value: row[sf.name] != null ? row[sf.name] : (sf.default || 0),
          oninput: e => { const n = parseInt(e.target.value, 10); row[sf.name] = isNaN(n) ? (sf.default || 0) : n; afterEdit(false); }
        });
        cells.push(input);
      } else {
        const input = el("input", { type: "text", value: row[sf.name] != null ? row[sf.name] : "",
          oninput: e => { row[sf.name] = e.target.value; afterEdit(false); } });
        cells.push(input);
      }
    });
    cells.push(el("button", { class: "btn small", onclick: () => { if (i > 0) { [arr[i-1], arr[i]] = [arr[i], arr[i-1]]; afterEdit(true); } } }, "\u2191"));
    cells.push(el("button", { class: "btn small", onclick: () => { if (i < arr.length-1) { [arr[i+1], arr[i]] = [arr[i], arr[i+1]]; afterEdit(true); } } }, "\u2193"));
    cells.push(el("button", { class: "btn small danger", onclick: () => { arr.splice(i, 1); afterEdit(true); } }, "x"));
    rows.appendChild(el("div", { class: "obj-row" }, cells));
  });

  const add = el("button", { class: "btn small add-row", onclick: () => {
    const row = {};
    field.sub.forEach(sf => { row[sf.name] = sf.type === "int" ? (sf.default || 0) : ""; });
    arr.push(row);
    afterEdit(true);
  } }, "+ Add skill");

  return el("fieldset", {}, [ el("legend", {}, field.label), rows, add ]);
}

function skillRefControl(row, sf, i) {
  const skills = state.files.skills || [];
  const ids = skills.map(s => s.Id).filter(Boolean);
  const cur = row[sf.name] != null ? row[sf.name] : "";
  if (ids.length === 0) {
    // free-text fallback when no skills loaded
    return el("input", { type: "text", value: cur, placeholder: "skill id",
      oninput: e => { row[sf.name] = e.target.value; afterEdit(false); } });
  }
  const opts = [ el("option", { value: "" }, "(select skill)") ];
  ids.forEach(id => opts.push(el("option", { value: id }, id)));
  const unknown = cur && !ids.includes(cur);
  if (unknown) opts.push(el("option", { value: cur }, cur + " (unknown)"));
  const sel = el("select", {
    class: unknown ? "ref-bad" : "",
    onchange: e => { row[sf.name] = e.target.value; afterEdit(true); }
  }, opts);
  sel.value = cur;
  return sel;
}

/* ---------- Tuning view ---------- */
function renderTuning() {
  const wrap = el("div", { class: "tuning-wrap" });
  wrap.appendChild(el("div", { class: "form-actions" }, [
    el("button", { class: "btn small", onclick: () => triggerUpload("tuning") }, "Upload tuning.json"),
    el("button", { class: "btn small primary", onclick: addTuning }, "+ Add key"),
    el("button", { class: "btn small", onclick: () => downloadFile("tuning") }, "Download tuning.json")
  ]));

  const table = el("table", { class: "tuning" });
  table.appendChild(el("tr", {}, [
    el("th", { class: "k" }, "Key"), el("th", { class: "v" }, "Value"), el("th", {}, "Description"), el("th", {}, "")
  ]));

  const tuning = state.files.tuning;
  Object.keys(tuning).forEach(k => {
    const entry = tuning[k] || {};
    const keyInput = el("input", { type: "text", value: k, onchange: e => { renameKey(tuning, k, e.target.value); afterEdit(true); } });
    const valInput = el("input", { type: "number", step: "any", value: entry.value != null ? entry.value : 0,
      oninput: e => { const n = parseFloat(e.target.value); entry.value = isNaN(n) ? 0 : n; afterEdit(false); } });
    const descInput = el("input", { type: "text", value: entry.desc != null ? entry.desc : "",
      oninput: e => { entry.desc = e.target.value; afterEdit(false); } });
    table.appendChild(el("tr", {}, [
      el("td", { class: "k" }, keyInput),
      el("td", { class: "v" }, valInput),
      el("td", {}, descInput),
      el("td", {}, el("button", { class: "btn small danger", onclick: () => { delete tuning[k]; afterEdit(true); } }, "x"))
    ]));
  });

  wrap.appendChild(table);
  return wrap;
}

function addTuning() {
  const tuning = state.files.tuning;
  const k = uniqueKey(tuning, "new.key");
  tuning[k] = { value: 0, desc: "" };
  afterEdit(true);
}

/* ---------- CRUD ---------- */
function addEntry(key) {
  const schema = SCHEMAS[key];
  const entry = {};
  for (const f of schema.fields) entry[f.name] = defaultFor(f);
  // ensure a unique-ish id
  entry[schema.idField] = uniqueId(key, "new_" + key.slice(0, -1));
  // New entries only "originally have" the always-present fields, so optional
  // fields left at their defaults are omitted from the output until edited.
  stampOrig(entry, schema.fields.filter(f => f.include === "always").map(f => f.name));
  state.files[key].push(entry);
  state.selected[key] = state.files[key].length - 1;
  afterEdit(true);
}

function duplicateEntry(key, idx) {
  const schema = SCHEMAS[key];
  const src = state.files[key][idx];
  const copy = JSON.parse(JSON.stringify(src));
  copy[schema.idField] = uniqueId(key, (copy[schema.idField] || "copy") + "_copy");
  // Preserve the source's field-presence so the duplicate round-trips identically.
  stampOrig(copy, src.__orig ? Array.from(src.__orig) : Object.keys(src));
  state.files[key].splice(idx + 1, 0, copy);
  state.selected[key] = idx + 1;
  afterEdit(true);
}

function deleteEntry(key, idx) {
  const schema = SCHEMAS[key];
  const name = state.files[key][idx][schema.labelField] || state.files[key][idx][schema.idField] || "this entry";
  if (!confirm("Delete " + stripMarkup(String(name)) + "?")) return;
  state.files[key].splice(idx, 1);
  if (state.selected[key] >= state.files[key].length) state.selected[key] = state.files[key].length - 1;
  afterEdit(true);
}

function defaultFor(field) {
  switch (field.type) {
    case "int": case "number": return field.default != null ? field.default : 0;
    case "bool": return field.default != null ? field.default : false;
    case "enum": return field.optional ? "" : (field.default != null ? field.default : (ENUMS[field.enum] ? ENUMS[field.enum][0] : ""));
    case "stringList": return [];
    case "numberMap": return {};
    case "objectList": return [];
    case "object": {
      const o = {}; (field.sub || []).forEach(sf => o[sf.name] = sf.default != null ? sf.default : 0); return o;
    }
    default: return "";
  }
}

/* ---------- helpers ---------- */
function renameKey(obj, oldKey, newKey) {
  if (oldKey === newKey) return;
  if (newKey === "" ) { return; }
  if (Object.prototype.hasOwnProperty.call(obj, newKey)) { toast("Key '" + newKey + "' already exists"); return; }
  const ordered = {};
  Object.keys(obj).forEach(k => { ordered[k === oldKey ? newKey : k] = obj[k]; });
  // mutate in place to preserve reference
  Object.keys(obj).forEach(k => delete obj[k]);
  Object.keys(ordered).forEach(k => obj[k] = ordered[k]);
}
function firstUnusedEnum(enumName, map) {
  const values = ENUMS[enumName] || [];
  for (const v of values) if (!Object.prototype.hasOwnProperty.call(map, v)) return v;
  return null;
}
function uniqueKey(obj, base) {
  if (!Object.prototype.hasOwnProperty.call(obj, base)) return base;
  let i = 2; while (Object.prototype.hasOwnProperty.call(obj, base + "_" + i)) i++;
  return base + "_" + i;
}
function uniqueId(key, base) {
  const schema = SCHEMAS[key];
  const ids = new Set(state.files[key].map(e => e[schema.idField]));
  if (!ids.has(base)) return base;
  let i = 2; while (ids.has(base + "_" + i)) i++;
  return base + "_" + i;
}
function stripMarkup(s) { return s.replace(/\{\{/g, "\u0001").replace(/\{[a-zA-Z]/g, "").replace(/\u0001/g, "{"); }

function afterEdit(structural) {
  if (structural) renderActiveTab();
  runValidation();
  renderWarnings();
}

/* ---------- Validation ---------- */
function runValidation() {
  const w = [];
  for (const key of ["classes","skills","species","forms"]) {
    const schema = SCHEMAS[key];
    const seen = new Map();
    state.files[key].forEach((e, i) => {
      const id = e[schema.idField];
      if (!id || String(id).trim() === "") w.push(`${schema.file}: entry #${i+1} has an empty Id.`);
      else {
        if (seen.has(id)) w.push(`${schema.file}: duplicate Id "${id}" (entries #${seen.get(id)+1} and #${i+1}).`);
        else seen.set(id, i);
      }
    });
  }
  // cross-ref: class skill ids must exist in skills
  const skillIds = new Set((state.files.skills || []).map(s => s.Id));
  if (skillIds.size > 0) {
    (state.files.classes || []).forEach(c => {
      (c.Skills || []).forEach(s => {
        if (s.SkillId && !skillIds.has(s.SkillId))
          w.push(`classes.json: class "${c.Id}" references unknown skill "${s.SkillId}".`);
      });
    });
  }
  state.warnings = w;
}

function renderWarnings() {
  const box = document.getElementById("warnings");
  clear(box);
  if (state.warnings.length === 0) {
    box.classList.remove("show");
    return;
  }
  box.classList.add("show");
  box.appendChild(el("strong", {}, state.warnings.length + " issue(s) found:"));
  const ul = el("ul", {});
  state.warnings.forEach(msg => ul.appendChild(el("li", {}, msg)));
  box.appendChild(ul);
}

/* ---------- Serialization ---------- */
function serializeFile(key) {
  if (key === "tuning") return JSON.stringify(buildTuning(), null, 2) + "\n";
  const schema = SCHEMAS[key];
  const out = state.files[key].map(e => buildEntry(schema, e));
  return JSON.stringify(out, null, 2) + "\n";
}

function buildEntry(schema, entry) {
  const o = {};
  for (const f of schema.fields) {
    const v = entry[f.name];
    if (!shouldInclude(f, v, entry)) continue;
    o[f.name] = coerceOut(f, v);
  }
  return o;
}

function isMeaningful(field, v) {
  const inc = field.include || "omitEmpty";
  if (inc === "omitDefault") {
    const def = field.default != null ? field.default : 0;
    return !(v == null || v === def);
  }
  if (v == null) return false;
  if (typeof v === "string") return v.trim() !== "";
  if (Array.isArray(v)) return v.length > 0;
  if (typeof v === "object") return Object.keys(v).length > 0;
  return true;
}

function shouldInclude(field, v, entry) {
  if ((field.include || "omitEmpty") === "always") return true;
  if (isMeaningful(field, v)) return true;
  // Preserve fields that were present in the originally-loaded data even when
  // they hold a default/empty value (matches the source files' field presence).
  return !!(entry && entry.__orig && entry.__orig.has(field.name));
}

function coerceOut(field, v) {
  switch (field.type) {
    case "int": { const n = parseInt(v, 10); return isNaN(n) ? (field.default || 0) : n; }
    case "number": { const n = parseFloat(v); return isNaN(n) ? (field.default || 0) : n; }
    case "bool": return !!v;
    case "stringList": return (Array.isArray(v) ? v : []).map(String).filter(s => s.trim() !== "");
    case "numberMap": {
      const o = {}; const src = v || {};
      Object.keys(src).forEach(k => { if (k.trim() !== "") { const n = parseFloat(src[k]); o[k] = isNaN(n) ? 0 : n; } });
      return o;
    }
    case "object": {
      const o = {}; (field.sub || []).forEach(sf => { const n = parseInt((v||{})[sf.name], 10); o[sf.name] = isNaN(n) ? (sf.default||0) : n; }); return o;
    }
    case "objectList": {
      return (Array.isArray(v) ? v : []).map(row => {
        const o = {};
        (field.sub || []).forEach(sf => {
          if (sf.type === "int") { const n = parseInt(row[sf.name], 10); o[sf.name] = isNaN(n) ? (sf.default||0) : n; }
          else o[sf.name] = row[sf.name] != null ? row[sf.name] : "";
        });
        return o;
      });
    }
    default: return v != null ? v : "";
  }
}

function buildTuning() {
  const t = state.files.tuning; const o = {};
  Object.keys(t).forEach(k => {
    if (k.trim() === "") return;
    const e = t[k] || {};
    const n = parseFloat(e.value);
    o[k] = { value: isNaN(n) ? 0 : n, desc: e.desc != null ? e.desc : "" };
  });
  return o;
}

/* ---------- Upload / Download ---------- */
function download(filename, text) {
  const blob = new Blob([text], { type: "application/json" });
  const url = URL.createObjectURL(blob);
  const a = el("a", { href: url, download: filename });
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  setTimeout(() => URL.revokeObjectURL(url), 1000);
}
function downloadFile(key) {
  const file = key === "tuning" ? "tuning.json" : SCHEMAS[key].file;
  download(file, serializeFile(key));
  toast("Downloaded " + file);
}
function downloadAll() {
  for (const key of TAB_ORDER) downloadFile(key);
}

let pendingUploadKey = null;
let fileInput = null;
function triggerUpload(key) {
  pendingUploadKey = key;
  if (!fileInput) {
    fileInput = el("input", { type: "file", accept: ".json,application/json", onchange: onUploadChange });
    document.body.appendChild(fileInput);
  }
  fileInput.value = "";
  fileInput.click();
}
function onUploadChange(e) {
  const file = e.target.files && e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = () => {
    try {
      const data = JSON.parse(reader.result);
      applyUpload(pendingUploadKey, data);
    } catch (err) {
      alert("Could not parse JSON: " + err.message);
    }
  };
  reader.readAsText(file);
}
function applyUpload(key, data) {
  if (key === "tuning") {
    if (typeof data !== "object" || Array.isArray(data) || data == null) { alert("tuning.json must be a JSON object."); return; }
    state.files.tuning = data;
  } else {
    if (!Array.isArray(data)) { alert(SCHEMAS[key].file + " must be a JSON array."); return; }
    state.files[key] = ingestArray(data);
    state.selected[key] = data.length ? 0 : -1;
  }
  toast("Loaded " + (key === "tuning" ? "tuning.json" : SCHEMAS[key].file));
  renderActiveTab();
  runValidation();
  renderWarnings();
}

/* ---------- Toast ---------- */
let toastTimer = null;
function toast(msg) {
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.classList.add("show");
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove("show"), 1800);
}

document.addEventListener("DOMContentLoaded", init);
</script>
